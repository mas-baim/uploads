<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Gambar ke Google Drive</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    h2 { margin-bottom: 1.5rem; color: #333; }
    input[type="file"], input[type="date"] {
      margin-bottom: 1rem;
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #4285F4;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: background 0.3s;
    }
    button:hover { background-color: #3367d6; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    #status {
      margin-top: 1rem;
      font-size: 14px;
      word-break: break-all;
    }
    .success { color: green; }
    .error { color: red; }
    .loading { color: #4285F4; }
    .hint { font-size: 12px; color: #666; margin-top: -0.5rem; margin-bottom: 1rem; text-align: left; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Upload ke Google Drive</h2>
    
    <label for="dateInput" style="display:block; text-align:left; font-weight:500; margin-bottom:4px;">📅 Pilih Tanggal:</label>
    <input type="date" id="dateInput">
    <p class="hint">💡 Folder akan otomatis dibuat berdasarkan tahun dan bulan dari tanggal yang dipilih.</b></p>
    
    <input type="file" id="fileInput" accept="image/*">
    <button id="uploadBtn" onclick="uploadFile()">Upload Gambar</button>	
	
    <p id="status"></p>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzl3JPd42A6A0Q2CbEuw-S0Jrio62M3WkRn7O2UayNGUo9XjGEXO5jjr41SBNUaKTObDA/exec'; // Ganti dengan URL Web App Anda

    // Daftar nama bulan dalam Bahasa Indonesia
    const NAMA_BULAN = [
      '01', '02', '03', '04', '05', '06',
      '07', '08', '09', '10', '11', '12'
    ];

    function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      const dateInput = document.getElementById('dateInput');
      const status = document.getElementById('status');
      const uploadBtn = document.getElementById('uploadBtn');

      // Validasi tanggal
      if (!dateInput.value) {
        status.innerHTML = '<span class="error">Silakan pilih tanggal terlebih dahulu!</span>';
        return;
      }

      // Validasi file
      if (fileInput.files.length === 0) {
        status.innerHTML = '<span class="error">Silakan pilih gambar terlebih dahulu!</span>';
        return;
      }

      const file = fileInput.files[0];
      
      if (file.size > 10 * 1024 * 1024) {
        status.innerHTML = '<span class="error">Ukuran file terlalu besar! Maksimal 10MB.</span>';
        return;
      }

      // === BAGIAN PENTING: Mengambil Tahun dan Bulan dari Date Picker ===
      const selectedDate = new Date(dateInput.value);
      const tahun = selectedDate.getFullYear();              // Contoh: 2026
      const bulanIndex = selectedDate.getMonth();            // 0 = Januari, 11 = Desember
      const namaBulan = NAMA_BULAN[bulanIndex];              // Contoh: "desember"
      const subFolderName = `${tahun}/${namaBulan}`;         // Hasil: "2026/desember"
      // ================================================================

      uploadBtn.disabled = true;
      status.innerHTML = `<span class="loading">Sedang mengupload ke Gdrive...</span>`;

      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Data = e.target.result.split(',')[1];
        const mimeType = file.type;
        const fileName = file.name;

        const payload = {
          fileName: fileName,
          fileData: base64Data,
          mimeType: mimeType,
          subFolderName: subFolderName
        };

        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          if (data.result === 'success') {
            status.innerHTML = `<span class="success">Berhasil diupload ke Gdrive!</span>`;
            fileInput.value = ''; 
            // dateInput.value = ''; // Uncomment jika ingin reset tanggal setelah upload
          } else {
            status.innerHTML = `<span class="error">Gagal: ${data.error}</span>`;
          }
        })
        .catch(error => {
          status.innerHTML = `<span class="error">Error jaringan: ${error}</span>`;
        })
        .finally(() => {
          uploadBtn.disabled = false;
        });
      };

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
